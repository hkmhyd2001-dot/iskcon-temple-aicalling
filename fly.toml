# Fly.io config for the ISKCON AI Calls backend.
# Deploy: fly launch (first time) / fly deploy. Set secrets with `fly secrets set`.
app = "iskcon-aicalls"
primary_region = "bom"  # Mumbai — closest to India callers + Plivo

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # keep warm: an alert must dial instantly
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
