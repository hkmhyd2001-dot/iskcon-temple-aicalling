# fly.toml app configuration file generated for iskcon-temple-aicalling on 2026-07-20T12:46:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iskcon-temple-aicalling'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
