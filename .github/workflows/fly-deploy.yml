# Auto-deploy the backend to Fly.io on every push to main — so Fly stays in sync
# with GitHub the same way Vercel does for the frontend.
#
# ONE-TIME SETUP (required for this to run):
#   1. Create a Fly deploy token (on the account that owns the app):
#        fly tokens create deploy -a iskcon-temple-aicalling
#      …or in the Fly dashboard → your app → Tokens → create a deploy token.
#   2. In GitHub: repo → Settings → Secrets and variables → Actions →
#      New repository secret → name: FLY_API_TOKEN, value: the token above.
name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
